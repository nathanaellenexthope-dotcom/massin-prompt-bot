name: Massin Prompt Generator

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: 'Nom du produit a rechercher'
        required: true
        default: 'casque audio'

jobs:
  generate-prompts:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt

      - name: Setup Google Credentials
        env:
          GOOGLE_CREDS: ${{ secrets.GOOGLE_CREDS }}
        run: |
          echo "$GOOGLE_CREDS" > /tmp/google_credentials.json

      - name: Run Prompt Generator
        env:
          PRODUCT_NAME: ${{ github.event.inputs.product_name }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDENTIALS_PATH: /tmp/google_credentials.json
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        run: python main.py

      - name: Cleanup
        run: rm -f /tmp/google_credentials.json
